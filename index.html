<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Medianeira</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <nav class="navbar bg-dark navbar-dark">
        <div class="container justify-content-center">
            <a class="navbar-brand" href="#">Turismo Medianeira</a>
        </div>
    </nav>

    <header class="cabecalho">
        <div class="container">
            <h1 class="display-3 fw-bold">Medianeira</h1>
            <p class="lead">Portal da entrada para o turismo do Oeste Paranaense</p>
        </div>
    </header>




    <div id="meuCarousel" class="carousel slide" data-bs-ride="carousel">

        <div class="carousel-inner">

            <div class="carousel-item active">
                <div class="bg-primary text-white d-flex align-items-center justify-content-center"
                    style="height: 300px;">
                    <h1>Bem-vindo a Medianeira!</h1>
                </div>
            </div>

            <div class="carousel-item active">
                <div class="bg-success text-white d-flex align-items-center justify-content-center"
                    style="height: 300px;">
                    <h1>Conheça o Morro da Salete</h1>
                </div>
            </div>

            <div class="carousel-item active">
                <div class="bg-primary text-white d-flex align-items-center justify-content-center"
                    style="height: 300px;">
                    <h1>Conheça o Lago Municipal</h1>
                </div>
            </div>

            <div class="carousel-item active">
                <div class="MatrizNossaSenhoraMedianeira"
                    style="height: 300px;">
                    <h1>Conheça a Matriz Nossa Senhora Medianeira</h1>
                </div>
            </div>



        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#meuCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#meuCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</body>

</html>
